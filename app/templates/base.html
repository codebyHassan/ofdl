{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LTF Freight Shiping & Logistic Services | ODFL {% endblock %}</title>

    <link rel="icon" type="image/x-icon" href="{% static 'images/main-logo.png' %}">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
      body {
        margin: 0;
        font-family: "Lato", sans-serif;
        background-color: #f8f9fa;
      }

      /* --- Desktop Navbar --- */
      .navbar-desktop {
        background-color: #1d6945;
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-around;
        color: white;
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .navbar-desktop .navbar-brand {
        display: flex;
        align-items: center;
        font-weight: 700;
      }

      .navbar-desktop img {
        width: 100px;
        height: auto;
        margin-right: 10px;
      }

      .navbar-desktop small {
        display: block;
        font-size: 14px;
        font-weight: bold;
      }

      .middle {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .navbar-desktop .track-box {
        display: flex;
        align-items: center;
        background: #fff;
        border-radius: 5px;
        padding: 4px 10px;
        width: 350px;
      }

      .navbar-desktop .track-box span {
        margin-right: 5px;
        font-weight: bold;
        font-size: 0.9rem;
      }

      .navbar-desktop .track-box input {
        border: none;
        outline: none;
        flex: 1;
        font-size: 0.95rem;
        color: #333;
      }

      .navbar-desktop .track-box button {
        border: none;
        background: transparent;
        color: #1d6945;
        font-size: 1.2rem;
        cursor: pointer;
      }

      /* Desktop Navigation Links */
      .navbar-desktop .nav-links {
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 25px;
      }

      .nav-item {
        position: relative;
      }

      .nav-link {
        color: white;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        padding: 10px 5px;
        display: inline-block;
        cursor: pointer;
      }

      .nav-link i {
        font-size: 10px;
        margin-left: 3px;
      }

      .nav-item.dropdown:hover .nav-link {
        color: #e0e0e0;
      }

      /* Desktop Dropdown Menu */
      .dropdown-menu {
        position: absolute;
        top: 100%;
        left: 0;
        background: white;
        min-width: 220px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        border-top: 3px solid #28a745;
        display: none;
        z-index: 1000;
        padding: 10px 0;
      }

      .nav-item.dropdown:hover .dropdown-menu {
        display: block;
      }

      .dropdown-menu a {
        display: block;
        padding: 10px 20px;
        color: #333;
        text-decoration: none;
        font-size: 14px;
        transition: background 0.2s;
      }

      .dropdown-menu a:hover {
        background: #f5f5f5;
        color: #28a745;
      }

      .navbar-desktop .right-buttons {
        display: flex;
        align-items: center;
      }

      .navbar-desktop .right-buttons .btn {
        border-radius: 20px;
        font-size: 14px;
        margin-left: 8px;
      }

      .btn-login {
        border: 1px solid #fff;
        color: #fff;
        background: none;
      }

      .btn-login:hover {
        background-color: rgba(255, 255, 255, 0.1);
      }

      .btn-signup {
        background-color: #3b7a4b;
        color: white;
      }

      .btn-signup:hover {
        background-color: #2f633e;
      }

      .search-icon-btn {
        background: none;
        border: none;
        color: white;
        font-size: 20px;
        margin-left: 10px;
        cursor: pointer;
        text-decoration: none;
      }

      /* --- Mobile Navbar --- */
      .navbar-mobile {
        display: none;
        background-color: #1d6945;
        padding: 10px 15px;
        color: white;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .navbar-mobile img {
        height: 40px;
        margin-right: 10px;
      }

      .navbar-mobile span {
        font-size: 13px;
        line-height: 16px;
      }

      .menu-toggle {
        background: none;
        border: none;
        color: white;
        font-size: 26px;
        cursor: pointer;
      }

      /* --- Side Menu --- */
      .side-menu {
        position: fixed;
        top: 0;
        right: -100%;
        width: 320px;
        height: 100%;
        background-color: white;
        color: #333;
        transition: right 0.3s ease;
        z-index: 1050;
        overflow-y: auto;
        box-shadow: -2px 0 5px rgba(0, 0, 0, 0.1);
      }

      .side-menu.active {
        right: 0;
      }

      .side-menu .close-btn {
        background: #1d6945;
        border: none;
        color: white;
        font-size: 16px;
        width: 100%;
        padding: 15px 20px;
        cursor: pointer;
        text-align: left;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .side-menu .close-btn:hover {
        background: #164d34;
      }

      .auth-buttons {
        display: flex;
        gap: 10px;
        padding: 15px 20px;
        background: #f9f9f9;
        border-bottom: 1px solid #e0e0e0;
      }

      .auth-buttons .btn {
        border-radius: 20px;
        padding: 8px 20px;
        flex: 1;
      }

      .track-box-mobile {
        display: flex;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 6px;
        margin: 15px 20px;
        overflow: hidden;
      }

      .track-box-mobile input {
        border: none;
        flex: 1;
        padding: 10px;
        outline: none;
        color: #333;
      }

      .track-box-mobile button {
        background: none;
        border: none;
        color: #1d6945;
        padding: 8px 12px;
        cursor: pointer;
      }

      .search-link {
        display: block;
        padding: 15px 20px;
        color: #333;
        text-decoration: none;
        font-weight: 600;
        border-bottom: 1px solid #e0e0e0;
      }

      .search-link:hover {
        background: #f5f5f5;
      }

      .search-link i {
        margin-right: 8px;
        color: #1d6945;
      }

      /* Mobile Menu Sections */
      .menu-section {
        border-bottom: 1px solid #e0e0e0;
      }

      .menu-toggle-item {
        padding: 15px 20px;
        margin: 0;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        color: #333;
        display: flex;
        justify-content: space-between;
        align-items: center;
        user-select: none;
        background: white;
      }

      .menu-toggle-item:hover {
        background: #f5f5f5;
      }

      .menu-toggle-item i {
        transition: transform 0.2s;
        font-size: 12px;
      }

      .menu-toggle-item.active i {
        transform: rotate(180deg);
      }

      .menu-link {
        display: block;
        padding: 15px 20px;
        color: #333;
        text-decoration: none;
        font-size: 16px;
        font-weight: 600;
      }

      .menu-link:hover {
        background: #f5f5f5;
        color: #1d6945;
      }

      .submenu {
        display: none;
        background: #f9f9f9;
        padding: 0;
      }

      .submenu.active {
        display: block;
      }

      .submenu a {
        display: block;
        padding: 12px 20px 12px 40px;
        color: #555;
        text-decoration: none;
        font-size: 14px;
        transition: background 0.2s;
      }

      .submenu a:hover {
        background: #e9e9e9;
        color: #1d6945;
      }

      /* Overlay for mobile menu */
      .menu-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1040;
        display: none;
      }

      .menu-overlay.active {
        display: block;
      }

      video {
        display: block;
        width: 100%;
        height: auto;
      }

      /* --- Footer --- */
      .footer {
        background-color: #2d7a50;
        color: white;
        padding: 40px 20px 20px;
      }

      .footer-top {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 40px;
        max-width: 1200px;
        margin: 0 auto 30px;
        padding-bottom: 30px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      }

      .footer-column h3 {
        font-size: 14px;
        font-weight: normal;
        margin-bottom: 10px;
      }

      .footer-column h2 {
        font-size: 28px;
        font-weight: bold;
        margin: 5px 0;
      }

      .footer-column p {
        font-size: 14px;
        margin: 5px 0;
      }

      .footer-links {
        display: flex;
        gap: 20px;
        margin-top: 15px;
      }

      .footer-links a {
        color: white;
        text-decoration: none;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .footer-links a:hover {
        text-decoration: underline;
      }

      .footer-middle {
        max-width: 1200px;
        margin: 0 auto 30px;
        padding-bottom: 30px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      }

      .footer-links-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        margin-bottom: 20px;
      }

      .footer-links-grid a {
        color: white;
        text-decoration: none;
        font-size: 14px;
      }

      .footer-links-grid a:hover {
        text-decoration: underline;
      }

      .social-icons {
        display: flex;
        gap: 15px;
      }

      .social-icons a {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background-color: white;
        color: #2d7a50;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        text-decoration: none;
      }

      .social-icons a:hover {
        background-color: #f0f0f0;
      }

      .footer-bottom {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
        font-size: 13px;
      }

      .footer-bottom p {
        margin: 0;
      }

      .footer-bottom-links {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }

      .footer-bottom-links a {
        color: white;
        text-decoration: none;
      }

      .footer-bottom-links a:hover {
        text-decoration: underline;
      }

      /* --- Responsive --- */
      @media (max-width: 991px) {
        .navbar-desktop {
          display: none !important;
        }

        .navbar-mobile {
          display: flex !important;
        }
      }

      @media (min-width: 992px) {
        .navbar-desktop {
          display: flex !important;
        }

        .navbar-mobile {
          display: none !important;
        }
      }

      @media (max-width: 768px) {
        .footer-top {
          grid-template-columns: 1fr;
        }

        .footer-links-grid {
          grid-template-columns: 1fr;
        }

        .footer-bottom {
          flex-direction: column;
          align-items: flex-start;
        }

        .footer-bottom-links {
          flex-direction: column;
          gap: 10px;
        }

        .side-menu {
          width: 280px;
        }
      }

      @media (max-width: 480px) {
        .side-menu {
          width: 100%;
        }
      }
    </style>
  
    <style>
        {% block style %}{% endblock %}
    </style>
</head>

<body>
    
    <!-- Menu Overlay -->
    <div class="menu-overlay" id="menuOverlay"></div>
    
    {% include 'header.html' %}

    {% block content %}
    {% endblock %}

    {% include 'footer.html' %}

    <!-- JavaScript -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Get elements
        const menuToggle = document.getElementById('menuToggle');
        const closeMenu = document.getElementById('closeMenu');
        const sideMenu = document.getElementById('sideMenu');
        const menuOverlay = document.getElementById('menuOverlay');

        // Open mobile menu
        if (menuToggle) {
          menuToggle.addEventListener('click', function(e) {
            e.stopPropagation();
            sideMenu.classList.add('active');
            menuOverlay.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent scrolling
          });
        }

        // Close mobile menu
        function closeMenuFunction() {
          sideMenu.classList.remove('active');
          menuOverlay.classList.remove('active');
          document.body.style.overflow = ''; // Restore scrolling
        }

        if (closeMenu) {
          closeMenu.addEventListener('click', closeMenuFunction);
        }

        // Close menu when clicking overlay
        if (menuOverlay) {
          menuOverlay.addEventListener('click', closeMenuFunction);
        }

        // Mobile submenu toggle
        const menuToggleItems = document.querySelectorAll('.menu-toggle-item');
        
        menuToggleItems.forEach(function(item) {
          item.addEventListener('click', function() {
            const submenu = this.nextElementSibling;
            
            if (submenu && submenu.classList.contains('submenu')) {
              const isActive = submenu.classList.contains('active');
              
              // Close all submenus
              document.querySelectorAll('.submenu').forEach(function(menu) {
                menu.classList.remove('active');
              });
              
              document.querySelectorAll('.menu-toggle-item').forEach(function(toggle) {
                toggle.classList.remove('active');
              });
              
              // Toggle current submenu
              if (!isActive) {
                submenu.classList.add('active');
                this.classList.add('active');
              }
            }
          });
        });

        // Close menu when clicking a submenu link
        const submenuLinks = document.querySelectorAll('.submenu a, .menu-link');
        submenuLinks.forEach(function(link) {
          link.addEventListener('click', function() {
            closeMenuFunction();
          });
        });
      });
    </script>

    <script>
        {% block script %}{% endblock %}
    </script>
</body>
</html>
